<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4B3B73" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>靈魂萬花筒｜個案報告</title>
  <link rel="stylesheet" href="report.css?v=2.4.0" />
</head>
<body>
  <div class="report-shell">
    <nav class="report-actions" aria-label="報告操作">
      <a class="action-button action-button--secondary" href="./">返回計算器</a>
      <button id="printReportBtn" class="action-button action-button--primary" type="button">列印／儲存 PDF</button>
      <button id="clearReportBtn" class="action-button action-button--danger" type="button">清除此報告</button>
    </nav>

    <main id="reportApp" class="report-document" aria-live="polite">
      <section id="reportLoading" class="report-state">
        <h1>載入個案報告</h1>
        <p>正在讀取此裝置中的報告資料。</p>
      </section>

      <section id="reportError" class="report-state report-state--error" hidden>
        <h1>無法顯示報告</h1>
        <p id="reportErrorText">報告資料不存在、已過期或格式不正確。</p>
        <a class="action-button action-button--primary" href="./">返回計算器重新產生</a>
      </section>

      <article id="reportContent" hidden>
        <header class="report-cover">
          <p class="report-kicker">Soul Kaleidoscope</p>
          <h1>靈魂萬花筒個案報告</h1>
          <p id="reportSubject" class="report-subject"></p>
          <p id="reportGeneratedAt" class="report-generated"></p>
        </header>

        <section class="report-section">
          <div class="section-heading">
            <span></span>
            <div>
              <h2>基本資料</h2>
              <p>本頁依計算器產生的 Soul Profile 顯示，不在報告頁重新計算。</p>
            </div>
          </div>
          <dl id="basicInfo" class="info-grid"></dl>
        </section>

        <section class="report-section">
          <div class="section-heading">
            <span></span>
            <div>
              <h2>國曆與農曆數字摘要</h2>
              <p>保留完整數字鏈、流年、今年位格、流月與流日。</p>
            </div>
          </div>
          <div class="table-wrap">
            <table class="summary-table">
              <thead>
                <tr>
                  <th>曆別</th>
                  <th>主命數</th>
                  <th>流年</th>
                  <th>今年位格</th>
                  <th>流月</th>
                  <th>流日</th>
                </tr>
              </thead>
              <tbody id="numerologySummary"></tbody>
            </table>
          </div>
        </section>

        <section class="report-section">
          <div class="section-heading">
            <span></span>
            <div>
              <h2>SNGL 頻率解讀</h2>
              <p>目前第一版包含國曆主命數、農曆主命數、國曆流年與農曆流年。</p>
            </div>
          </div>
          <div id="reportSections" class="interpretation-list"></div>
        </section>

        <section class="report-section report-section--compact">
          <div class="section-heading">
            <span></span>
            <div>
              <h2>數字結構參考</h2>
              <p>貴人數、日座、日月綻放與四個木馬。</p>
            </div>
          </div>
          <div id="horseCards" class="horse-grid"></div>
        </section>

        <footer id="reportVersions" class="report-footer"></footer>
      </article>
    </main>
  </div>

  <script src="report.js?v=2.4.0"></script>
</body>
</html>
