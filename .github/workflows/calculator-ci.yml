name: Calculator CI

on:
  push:
    branches:
      - calculator-deploy-setup
    paths:
      - "calculator-deploy/**"
      - "src/core/lunar-calendar-data.js"
      - ".github/workflows/calculator-ci.yml"
  pull_request:
    paths:
      - "calculator-deploy/**"
      - "src/core/lunar-calendar-data.js"
      - ".github/workflows/calculator-ci.yml"

permissions:
  contents: read

concurrency:
  group: calculator-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: calculator-deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Run core regression suite
        run: npm run test:core

      - name: Run case store tests
        run: npm run test:cases

      - name: Run report model tests
        run: npm run test:report

      - name: Run kaleidoscope model tests
        run: npm run test:kaleidoscope

      - name: Run knowledge data tests
        run: npm run test:knowledge

      - name: Upload knowledge diff summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-number-topic-diff
          path: calculator-deploy/data/knowledge/reports/number-topic-diff.generated.json
          if-no-files-found: warn
          retention-days: 14

      - name: Validate production build
        run: node build-calculator.js
