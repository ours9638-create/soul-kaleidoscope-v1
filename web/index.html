<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#172033">
    <title>靈魂萬花筒 v1</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="label">後台工作台</p>
        <h1>靈魂萬花筒</h1>
      </div>
      <button id="installButton" hidden>安裝</button>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>新增個案</h2>
        <form id="caseForm">
          <label>服務類型
            <select name="serviceId">
              <option value="soul-number-reading" selected>靈魂萬花筒數字盤</option>
              <option value="essential-oil-product">精油產品/配方</option>
              <option value="soul-number-with-oil">數字盤 + 精油搭配</option>
            </select>
          </label>
          <label>姓名/代稱 <input name="displayName" value="小狐狸" required></label>
          <div id="numberFields">
            <label>國曆生日 <input name="solarDate" type="date" value="1989-05-28"></label>
            <label>農曆生日 <input name="lunarDate" type="date" value="1989-04-24" placeholder="可留空自動換算"></label>
            <label>出生時間 <input name="birthTime" type="time" value="15:17"></label>
            <label>查詢日期 <input name="queryDate" type="date"></label>
            <details class="observation-fields">
              <summary>個案觀察與報告人味設定</summary>
              <label>客戶可見稱呼，勿填內部代稱 <input name="clientDisplayName"></label>
              <label>本次主要議題 <textarea name="mainIssue" rows="2"></textarea></label>
              <label>近期困擾或轉折 <textarea name="recentTransition" rows="2"></textarea></label>
              <label>重複出現的模式 <textarea name="repeatingPattern" rows="2"></textarea></label>
              <label>希望加強的方向 <textarea name="growthFocus" rows="2"></textarea></label>
              <label>不希望出現在報告中的內容 <textarea name="excludedTopics" rows="2"></textarea></label>
              <label>本月實際背景 <textarea name="monthlyContext" rows="2"></textarea></label>
              <label>已核准給客戶看的摘要 <textarea name="approvedClientSummary" rows="3"></textarea></label>
              <p class="form-note">前六項是內部觀察；客戶可見稱呼與已核准摘要會進客戶報告與 Canva 套版包，勿填內部代稱或原始諮詢筆記。</p>
            </details>
          </div>
          <div id="oilFields" hidden>
            <label>使用情境 <input name="usageScenario" value="年度支持"></label>
            <label>產品型態 <input name="productType" value="滾珠"></label>
            <label>建議精油 <input name="selectedOils" value="乳香、岩蘭草、甜橙"></label>
            <p class="form-note">精油可單獨成為產品，也可作為數字盤支持層；不寫治療、治癒、保證改善。</p>
          </div>
          <label>Apps Script API URL <input name="apiUrl" placeholder="部署後貼上 Web App URL，可先留空"></label>
          <div class="actions">
            <button type="button" id="saveApiUrlButton">儲存 URL</button>
            <button type="button" id="checkBackendButton">檢查後台</button>
          </div>
          <div class="actions">
            <button type="submit">計算</button>
            <button type="button" id="sendButton">送到後台</button>
          </div>
        </form>
      </section>

      <section class="panel result-panel">
        <div class="section-title">
          <h2>計算結果</h2>
          <span id="status">待輸入</span>
        </div>
        <div id="summary" class="summary-grid"></div>
      </section>

      <section class="panel wide">
        <div class="section-title">
          <h2>校對版圖像</h2>
          <button id="downloadSvgButton" type="button">下載 SVG</button>
        </div>
        <div id="svgPreview" class="svg-preview"></div>
      </section>

      <section class="panel wide">
        <div class="section-title">
          <h2>報告草稿</h2>
          <div class="actions">
            <button id="downloadReportButton" type="button">下載 Markdown</button>
            <button id="downloadPractitionerCardButton" type="button">下載 A5 手卡</button>
            <button id="downloadCanvaPackageButton" type="button">下載 Canva 套版包</button>
          </div>
        </div>
        <pre id="reportPreview">尚未產生</pre>
      </section>

      <section class="panel wide">
        <h2>免費資源架構與下一步</h2>
        <div id="resourcePlan"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
